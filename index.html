<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 一年级数学游戏集</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .header {
    background: white;
    border-radius: 20px;
    padding: 20px 32px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 700px;
  }
  .header h1 {
    font-size: 26px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .header p { color: #888; font-size: 14px; }

  .game-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 700px;
  }
  .game-card {
    background: white;
    border-radius: 20px;
    padding: 24px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    border: 3px solid transparent;
  }
  .game-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  }
  .game-card.active { border-color: #667eea; transform: scale(1.02); }
  .game-card .icon { font-size: 52px; margin-bottom: 12px; }
  .game-card h2 { font-size: 20px; color: #1e1b4b; margin-bottom: 8px; }
  .game-card p { font-size: 13px; color: #888; line-height: 1.6; }
  .game-card .tags { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
  .game-card .tag { background: #f0f0ff; color: #7c3aed; border-radius: 99px; padding: 3px 10px; font-size: 11px; font-weight: bold; }
  .game-card.pink { border-top: 4px solid #ff6b6b; }
  .game-card.purple { border-top: 4px solid #7c3aed; }
  .game-card .play-btn {
    display: inline-block; margin-top: 14px; padding: 10px 28px; border-radius: 99px;
    font-size: 15px; font-weight: bold; color: white;
    background: linear-gradient(135deg, #667eea, #764ba2);
    box-shadow: 0 4px 12px rgba(102,126,234,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .game-card.pink .play-btn { background: linear-gradient(135deg, #ff6b6b, #ff9a3c); box-shadow: 0 4px 12px rgba(255,107,107,0.4); }
  .game-card:hover .play-btn { transform: scale(1.05); }

  .iframe-container {
    width: 100%; max-width: 700px; background: white; border-radius: 20px;
    overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    display: none; flex-direction: column;
  }
  .iframe-container.show { display: flex; }
  .iframe-header {
    background: linear-gradient(135deg, #667eea, #764ba2); padding: 12px 20px;
    display: flex; justify-content: space-between; align-items: center; color: white;
  }
  .iframe-header h3 { font-size: 16px; }
  .iframe-header .back-btn {
    background: rgba(255,255,255,0.2); border: none; color: white;
    padding: 6px 16px; border-radius: 99px; font-size: 13px; cursor: pointer; font-weight: bold;
  }
  .iframe-header .back-btn:hover { background: rgba(255,255,255,0.3); }
  iframe { width: 100%; height: 85vh; min-height: 600px; border: none; display: block; }

  .qr-box {
    background: white; border-radius: 20px; padding: 20px; text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 700px;
    margin-bottom: 30px;
  }
  .qr-box h3 { font-size: 15px; color: #5b21b6; margin-bottom: 12px; }
  .qr-box img { border-radius: 12px; }
  .qr-hint { font-size: 12px; color: #888; margin-top: 8px; }

  @media (max-width: 600px) { .game-cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>🌟 一年级数学游戏集</h1>
  <p>人教版一年级下册 · 选择你喜欢的游戏开始吧！</p>
</div>

<div class="game-cards">
  <div class="game-card pink" id="cardMath" onclick="showGame('math')">
    <div class="icon">🎮</div>
    <h2>快乐学数学</h2>
    <p>趣味互动游戏<br>数苹果、比大小、涂色...</p>
    <div class="tags"><span class="tag">10题/局</span><span class="tag">互动选择</span><span class="tag">有声音</span></div>
    <span class="play-btn">▶ 开始游戏</span>
  </div>

  <div class="game-card purple" id="cardQuiz" onclick="showGame('quiz')">
    <div class="icon">🏆</div>
    <h2>闯关挑战</h2>
    <p>章节选择题库<br>可选章节、详细解析</p>
    <div class="tags"><span class="tag">20题/局</span><span class="tag">选择填空</span><span class="tag">有解析</span></div>
    <span class="play-btn">▶ 开始闯关</span>
  </div>
</div>

<div class="iframe-container" id="gameContainer">
  <div class="iframe-header" id="gameHeader">
    <h3 id="gameTitle">游戏</h3>
    <button class="back-btn" onclick="closeGame()">← 返回选择</button>
  </div>
  <iframe id="gameFrame" src="" allow="autoplay"></iframe>
</div>

<div class="qr-box">
  <h3>📱 扫码手机畅玩</h3>
  <img id="qrcode" alt="游戏二维码" />
  <div class="qr-hint" id="qrHint">微信/支付宝扫一扫</div>
</div>

<script>
let currentGame = null;

function showGame(type) {
  const container = document.getElementById('gameContainer');
  const frame = document.getElementById('gameFrame');
  const header = document.getElementById('gameHeader');
  const title = document.getElementById('gameTitle');
  document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active'));
  
  if (type === 'math') {
    document.getElementById('cardMath').classList.add('active');
    header.style.background = 'linear-gradient(135deg, #ff6b6b, #ff9a3c)';
    frame.src = 'math-game.html';
    title.textContent = '🎮 快乐学数学';
  } else {
    document.getElementById('cardQuiz').classList.add('active');
    header.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
    frame.src = 'quiz.html';
    title.textContent = '🏆 闯关挑战';
  }
  
  container.classList.add('show');
  container.scrollIntoView({ behavior: 'smooth' });
  currentGame = type;
}

function closeGame() {
  document.getElementById('gameContainer').classList.remove('show');
  document.getElementById('gameFrame').src = '';
  document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active'));
  currentGame = null;
}

const baseUrl = window.location.href.replace(/\?.*$/, '').replace(/\/[^\/]*$/, '/');
const shareUrl = baseUrl;

document.getElementById('qrcode').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(shareUrl)}&margin=10&format=png`;
document.getElementById('qrHint').textContent = '微信/支付宝扫一扫，或长按识别';

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGame(); });
</script>
</body>
</html>
